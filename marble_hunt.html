<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Marble Hunt - The Ultimate Challenge</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f0f4f8;
            --bg-card: rgba(255, 255, 255, 0.85);
            --bg-solid: #ffffff;
            --text: #1a202c;
            --text-light: #718096;
            --accent: #6366f1;
            --accent-light: #818cf8;
            --accent-dark: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            --shadow-glow: 0 0 40px rgba(99, 102, 241, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #e0e7ff 0%, #f0f9ff 50%, #fef3c7 100%);
            min-height: 100vh;
            overflow-x: hidden;
            color: var(--text);
            -webkit-tap-highlight-color: transparent;
        }

        .bg-mesh {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(245, 158, 11, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 10%, rgba(16, 185, 129, 0.05) 0%, transparent 50%);
            animation: meshMove 20s ease-in-out infinite alternate;
        }

        @keyframes meshMove {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-20px, 10px) scale(1.02); }
            100% { transform: translate(20px, -10px) scale(1); }
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
            opacity: 0.4;
            animation: orbFloat 15s ease-in-out infinite;
        }
        .orb-1 { width: 300px; height: 300px; background: rgba(99, 102, 241, 0.2); top: -100px; left: -100px; animation-delay: 0s; }
        .orb-2 { width: 250px; height: 250px; background: rgba(245, 158, 11, 0.15); bottom: -50px; right: -50px; animation-delay: -5s; }
        .orb-3 { width: 200px; height: 200px; background: rgba(16, 185, 129, 0.12); top: 50%; left: 50%; animation-delay: -10s; }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }

        .game-wrap {
            position: relative;
            z-index: 1;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            text-align: center;
            padding: 30px 0 20px;
        }

        .logo {
            font-size: 3.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark), #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -2px;
            line-height: 1.1;
            animation: logoPulse 3s ease-in-out infinite;
        }

        @keyframes logoPulse {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.02); filter: brightness(1.1); }
        }

        .tagline {
            font-size: 1.1rem;
            color: var(--text-light);
            font-weight: 400;
            margin-top: 8px;
            letter-spacing: 0.5px;
        }

        .level-track {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 25px 0;
            flex-wrap: wrap;
        }

        .level-pill {
            padding: 10px 24px;
            border-radius: 50px;
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 2px solid transparent;
            font-weight: 700;
            font-size: 0.9rem;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-sm);
            color: var(--text-light);
            position: relative;
            overflow: hidden;
        }

        .level-pill::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: -1;
        }

        .level-pill.active {
            border-color: var(--accent);
            color: var(--accent);
            transform: scale(1.08);
            box-shadow: var(--shadow-glow);
        }

        .level-pill.active::before { opacity: 0.1; }

        .level-pill.completed {
            border-color: var(--success);
            color: var(--success);
            background: rgba(16, 185, 129, 0.1);
        }

        .level-pill.failed {
            border-color: var(--danger);
            color: var(--danger);
            background: rgba(239, 68, 68, 0.1);
        }

        .level-pill.locked {
            opacity: 0.4;
        }

        .game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 0;
            min-height: 400px;
        }

        .status-text {
            font-size: 1.4rem;
            font-weight: 600;
            text-align: center;
            margin-bottom: 40px;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            padding: 0 20px;
        }

        .status-text.animate {
            animation: statusSlide 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes statusSlide {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .timer-wrap {
            width: 100%;
            max-width: 400px;
            margin-bottom: 30px;
            opacity: 0;
            transition: opacity 0.3s ease;
            height: 0;
            overflow: hidden;
        }

        .timer-wrap.active {
            opacity: 1;
            height: auto;
        }

        .timer-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-light);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .timer-bar-bg {
            height: 6px;
            background: rgba(0,0,0,0.05);
            border-radius: 10px;
            overflow: hidden;
        }

        .timer-bar-fill {
            height: 100%;
            border-radius: 10px;
            background: linear-gradient(90deg, var(--accent), var(--accent-light));
            transition: width 0.1s linear, background 0.3s ease;
            width: 100%;
        }

        .timer-bar-fill.warning { background: linear-gradient(90deg, var(--warning), #fbbf24); }
        .timer-bar-fill.danger { background: linear-gradient(90deg, var(--danger), #f87171); }

        .boxes-wrap {
            display: flex;
            gap: 40px;
            justify-content: center;
            align-items: flex-end;
            min-height: 280px;
            padding: 30px;
            position: relative;
            perspective: 1200px;
            flex-wrap: wrap;
        }

        .box-unit {
            position: relative;
            width: 160px;
            height: 200px;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .box-unit:hover:not(.disabled) {
            transform: translateY(-8px) scale(1.02);
        }

        .box-unit.disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }

        .box-unit.shaking {
            animation: boxShake 0.4s ease-in-out;
        }

        @keyframes boxShake {
            0%, 100% { transform: translateX(0) rotate(0deg); }
            20% { transform: translateX(-8px) rotate(-2deg); }
            40% { transform: translateX(8px) rotate(2deg); }
            60% { transform: translateX(-4px) rotate(-1deg); }
            80% { transform: translateX(4px) rotate(1deg); }
        }

        .box-body {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 160px;
            background: linear-gradient(180deg, #f8fafc 0%, #e2e8f0 100%);
            border-radius: 4px 4px 16px 16px;
            box-shadow: 
                0 4px 6px rgba(0,0,0,0.07),
                0 10px 20px rgba(0,0,0,0.05),
                inset 0 1px 0 rgba(255,255,255,0.8),
                inset 0 -2px 4px rgba(0,0,0,0.03);
            border: 1px solid rgba(203, 213, 225, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .box-body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 30px;
            background: linear-gradient(180deg, rgba(255,255,255,0.6), transparent);
            border-radius: 4px 4px 0 0;
        }

        .box-body::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 20px;
            background: linear-gradient(0deg, rgba(0,0,0,0.03), transparent);
            border-radius: 0 0 16px 16px;
        }

        .box-lid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 50px;
            background: linear-gradient(180deg, #ffffff 0%, #f1f5f9 100%);
            border-radius: 12px 12px 4px 4px;
            box-shadow: 
                0 2px 8px rgba(0,0,0,0.08),
                0 4px 12px rgba(0,0,0,0.04),
                inset 0 1px 0 rgba(255,255,255,1);
            border: 1px solid rgba(203, 213, 225, 0.6);
            z-index: 10;
            transform-origin: bottom center;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.3rem;
            color: var(--text-light);
            letter-spacing: 1px;
        }

        .box-lid::after {
            content: '';
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 6px;
            background: linear-gradient(180deg, #cbd5e1, #94a3b8);
            border-radius: 3px;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.1);
        }

        .box-number {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 800;
            font-size: 1rem;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
            z-index: 20;
            transition: all 0.3s ease;
        }

        .box-unit.open .box-lid {
            transform: rotateX(-120deg) translateY(-10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .box-unit.open .box-body {
            background: linear-gradient(180deg, #fef3c7 0%, #fde68a 100%);
            box-shadow: 
                0 4px 6px rgba(0,0,0,0.07),
                0 0 30px rgba(245, 158, 11, 0.2),
                inset 0 1px 0 rgba(255,255,255,0.8);
        }

        .box-unit.correct .box-body {
            background: linear-gradient(180deg, #d1fae5 0%, #a7f3d0 100%);
            box-shadow: 
                0 4px 6px rgba(0,0,0,0.07),
                0 0 40px rgba(16, 185, 129, 0.3),
                inset 0 1px 0 rgba(255,255,255,0.8);
        }

        .box-unit.wrong .box-body {
            background: linear-gradient(180deg, #fee2e2 0%, #fecaca 100%);
            box-shadow: 
                0 4px 6px rgba(0,0,0,0.07),
                0 0 40px rgba(239, 68, 68, 0.3),
                inset 0 1px 0 rgba(255,255,255,0.8);
        }

        .box-unit.correct .box-number {
            background: linear-gradient(135deg, var(--success), #059669);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4);
        }

        .box-unit.wrong .box-number {
            background: linear-gradient(135deg, var(--danger), #dc2626);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.4);
        }

        .marble {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: 
                radial-gradient(circle at 35% 35%, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0) 50%),
                radial-gradient(circle at 50% 50%, #60a5fa 0%, #3b82f6 40%, #1d4ed8 100%);
            box-shadow: 
                0 4px 15px rgba(59, 130, 246, 0.4),
                0 8px 25px rgba(59, 130, 246, 0.2),
                inset -3px -3px 8px rgba(0,0,0,0.2);
            position: absolute;
            bottom: 35px;
            left: 50%;
            transform: translateX(-50%) scale(0);
            transition: transform 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 5;
        }

        .box-unit.open .marble {
            transform: translateX(-50%) scale(1);
        }

        .box-unit.open .marble.bounce {
            animation: marbleBounce 0.6s ease;
        }

        @keyframes marbleBounce {
            0% { transform: translateX(-50%) scale(0) translateY(30px); }
            50% { transform: translateX(-50%) scale(1.2) translateY(-15px); }
            100% { transform: translateX(-50%) scale(1) translateY(0); }
        }

        .box-shadow {
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 20px;
            background: radial-gradient(ellipse, rgba(0,0,0,0.15) 0%, transparent 70%);
            border-radius: 50%;
            transition: all 0.3s ease;
            z-index: -1;
        }

        .box-unit:hover:not(.disabled) .box-shadow {
            width: 140px;
            opacity: 0.8;
        }

        .box-unit.moving {
            transition: left 0.5s cubic-bezier(0.4, 0, 0.2, 1), 
                        transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
        }

        .box-unit.lifting {
            animation: boxLift 0.6s ease-in-out;
        }

        @keyframes boxLift {
            0% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-40px) scale(1.05); }
            100% { transform: translateY(0) scale(1); }
        }

        .controls {
            display: flex;
            gap: 16px;
            margin-top: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 14px 36px;
            border: none;
            border-radius: 16px;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s ease;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: white;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
        }

        .btn-secondary {
            background: var(--bg-solid);
            color: var(--text);
            border: 2px solid var(--accent);
        }

        .btn-secondary:hover {
            background: var(--accent);
            color: white;
            transform: translateY(-3px);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .attempts-panel {
            position: fixed;
            top: 20px;
            left: 20px;
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            padding: 16px 24px;
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
            border: 1px solid rgba(255,255,255,0.6);
            z-index: 100;
            display: none;
            animation: slideInLeft 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .attempts-panel.active {
            display: block;
        }

        .attempts-title {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .attempts-dots {
            display: flex;
            gap: 10px;
        }

        .attempt-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-light), var(--accent));
            box-shadow: 0 2px 8px rgba(99, 102, 241, 0.3);
            transition: all 0.3s ease;
        }

        .attempt-dot.used {
            background: linear-gradient(135deg, var(--danger), #dc2626);
            box-shadow: 0 2px 8px rgba(239, 68, 68, 0.3);
            transform: scale(0.85);
        }

        @keyframes slideInLeft {
            from { transform: translateX(-50px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            padding: 20px;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal-card {
            background: var(--bg-solid);
            padding: 48px 40px;
            border-radius: 32px;
            box-shadow: var(--shadow-lg), 0 0 60px rgba(99, 102, 241, 0.1);
            max-width: 480px;
            width: 100%;
            text-align: center;
            transform: scale(0.85) translateY(20px);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255,255,255,0.8);
            position: relative;
            overflow: hidden;
        }

        .modal-overlay.active .modal-card {
            transform: scale(1) translateY(0);
        }

        .modal-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 6px;
            background: linear-gradient(90deg, var(--accent), var(--accent-light), var(--accent-dark));
        }

        .modal-emoji {
            font-size: 5rem;
            margin-bottom: 20px;
            display: block;
            animation: emojiBounce 1s ease infinite;
        }

        @keyframes emojiBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .modal-title {
            font-size: 2.2rem;
            font-weight: 900;
            margin-bottom: 12px;
            color: var(--text);
            letter-spacing: -1px;
        }

        .modal-message {
            font-size: 1.1rem;
            color: var(--text-light);
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .score-board {
            display: none;
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            padding: 32px;
            border-radius: 24px;
            box-shadow: var(--shadow-lg);
            border: 1px solid rgba(255,255,255,0.6);
            max-width: 500px;
            width: 100%;
            margin: 20px auto;
            animation: fadeInUp 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .score-board.active {
            display: block;
        }

        .score-title {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 24px;
            color: var(--text);
            text-align: center;
            letter-spacing: -0.5px;
        }

        .score-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            font-size: 1rem;
        }

        .score-row:last-child {
            border-bottom: none;
            margin-top: 10px;
            padding-top: 20px;
            border-top: 2px solid var(--accent);
            font-weight: 800;
            font-size: 1.2rem;
            color: var(--accent-dark);
        }

        .score-status {
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.85rem;
        }

        .score-status.correct { 
            background: rgba(16, 185, 129, 0.1); 
            color: var(--success); 
        }
        .score-status.wrong { 
            background: rgba(239, 68, 68, 0.1); 
            color: var(--danger); 
        }

        .final-message {
            text-align: center;
            padding: 30px;
            margin-top: 20px;
        }

        .final-emoji {
            font-size: 4rem;
            margin-bottom: 16px;
            animation: emojiBounce 1s ease infinite;
        }

        .final-title {
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .final-text {
            font-size: 1.1rem;
            color: var(--text-light);
            line-height: 1.6;
        }

        .confetti-wrap {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 999;
            overflow: hidden;
        }

        .confetti-piece {
            position: absolute;
            width: 10px; height: 10px;
            animation: confettiFall 3s ease-out forwards;
        }

        @keyframes confettiFall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .logo { font-size: 2.5rem; }
            .box-unit { width: 120px; height: 160px; }
            .box-body { height: 130px; }
            .box-lid { height: 40px; font-size: 1.1rem; }
            .boxes-wrap { gap: 20px; padding: 15px; }
            .modal-card { padding: 32px 24px; }
            .modal-title { font-size: 1.8rem; }
            .attempts-panel { top: 10px; left: 10px; padding: 12px 18px; }
        }

        @media (max-width: 480px) {
            .box-unit { width: 90px; height: 130px; }
            .box-body { height: 105px; }
            .box-lid { height: 35px; font-size: 0.9rem; }
            .box-number { width: 28px; height: 28px; font-size: 0.8rem; top: -12px; }
            .boxes-wrap { gap: 12px; }
            .btn { padding: 12px 24px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <div class="bg-mesh"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="confetti-wrap" id="confettiWrap"></div>

    <div class="attempts-panel" id="attemptsPanel">
        <div class="attempts-title">Attempts Left</div>
        <div class="attempts-dots" id="attemptsDots"></div>
    </div>

    <div class="game-wrap">
        <div class="header">
            <h1 class="logo">MARBLE HUNT</h1>
            <p class="tagline">Find the hidden marble. Trust your eyes... if you can.</p>
        </div>

        <div class="level-track" id="levelTrack"></div>

        <div class="game-area" id="gameArea">
            <div class="timer-wrap" id="timerWrap">
                <div class="timer-label">
                    <span>Time</span>
                    <span id="timerText">10s</span>
                </div>
                <div class="timer-bar-bg">
                    <div class="timer-bar-fill" id="timerBar"></div>
                </div>
            </div>

            <div class="status-text" id="statusText">Welcome! Click START to begin</div>

            <div class="boxes-wrap" id="boxesWrap"></div>

            <div class="controls" id="controls">
                <button class="btn btn-primary" id="startBtn" onclick="startGame()">Start Game</button>
                <button class="btn btn-secondary" id="nextBtn" onclick="nextLevel()" style="display:none;">Next Level</button>
                <button class="btn btn-secondary" id="restartBtn" onclick="restartGame()" style="display:none;">Play Again</button>
            </div>
        </div>

        <div class="score-board" id="scoreBoard">
            <div class="score-title">🏆 Final Score Board</div>
            <div id="scoreContent"></div>
        </div>

        <div class="final-message" id="finalMessage" style="display:none;"></div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-card">
            <span class="modal-emoji" id="modalEmoji">🎉</span>
            <div class="modal-title" id="modalTitle">Well Done!</div>
            <div class="modal-message" id="modalMessage">You found the marble!</div>
            <button class="btn btn-primary" onclick="closeModal()">Continue</button>
        </div>
    </div>

    <script>
        const CONFIG = {
            levels: [
                { level: 1, boxes: 3, speed: 1500, shuffleCount: 5, attempts: 1, timeLimit: 10 },
                { level: 2, boxes: 3, speed: 1000, shuffleCount: 8, attempts: 1, timeLimit: 8 },
                { level: 3, boxes: 4, speed: 700, shuffleCount: 12, attempts: 1, timeLimit: 6 },
                { level: 4, boxes: 5, speed: 400, shuffleCount: 20, attempts: 3, timeLimit: 5 }
            ],
            messages: {
                start: "Watch the marble closely...",
                shuffling: "Shuffling... Keep your eyes open!",
                guess: "Where is the marble? Choose a box!",
                correct: "Correct! Sharp eyes!",
                wrong: "Wrong! Better luck next time!",
                timeout: "Too slow! Time's up!",
                level4Trap: "Nice try... but the marble moved! 😈",
                final: {
                    score3: { emoji: "🌟", title: "Well Done!", text: "Practice more, you're almost a pro!" },
                    score2: { emoji: "😅", title: "Not Bad...", text: "This game is not for you." },
                    score1: { emoji: "🤦", title: "Really?", text: "Go play Ludo instead." },
                    score0: { emoji: "💀", title: "Disaster!", text: "Go play Ludo instead." }
                }
            }
        };

        let currentLevel = 0;
        let scores = [null, null, null, null];
        let marblePos = 0;
        let isShuffling = false;
        let canGuess = false;
        let level4Attempts = 0;
        let timerInterval = null;
        let gameActive = false;

        document.addEventListener('DOMContentLoaded', () => {
            renderLevelTrack();
        });

        function renderLevelTrack() {
            const track = document.getElementById('levelTrack');
            track.innerHTML = '';
            CONFIG.levels.forEach((lvl, idx) => {
                const pill = document.createElement('div');
                pill.className = 'level-pill';
                pill.textContent = 'Level ' + lvl.level;
                if (idx === currentLevel && gameActive) pill.classList.add('active');
                else if (scores[idx] === true) pill.classList.add('completed');
                else if (scores[idx] === false) pill.classList.add('failed');
                else if (idx > currentLevel || !gameActive) pill.classList.add('locked');
                track.appendChild(pill);
            });
        }

        function startGame() {
            currentLevel = 0;
            scores = [null, null, null, null];
            gameActive = true;
            document.getElementById('scoreBoard').classList.remove('active');
            document.getElementById('finalMessage').style.display = 'none';
            document.getElementById('startBtn').style.display = 'none';
            renderLevelTrack();
            startLevel();
        }

        function startLevel() {
            const cfg = CONFIG.levels[currentLevel];
            canGuess = false;
            isShuffling = false;
            level4Attempts = 0;
            
            const panel = document.getElementById('attemptsPanel');
            if (currentLevel === 3) {
                panel.classList.add('active');
                renderAttemptsDots();
            } else {
                panel.classList.remove('active');
            }
            
            renderLevelTrack();
            renderBoxes();
            
            setTimeout(() => {
                showMarble();
                setTimeout(() => {
                    hideMarble();
                    setTimeout(() => shuffleBoxes(), 600);
                }, 1800);
            }, 400);
        }

        function renderBoxes() {
            const wrap = document.getElementById('boxesWrap');
            const cfg = CONFIG.levels[currentLevel];
            wrap.innerHTML = '';
            
            for (let i = 0; i < cfg.boxes; i++) {
                const unit = document.createElement('div');
                unit.className = 'box-unit';
                unit.dataset.index = i;
                unit.onclick = function() { handleGuess(i); };
                
                const shadow = document.createElement('div');
                shadow.className = 'box-shadow';
                
                const number = document.createElement('div');
                number.className = 'box-number';
                number.textContent = i + 1;
                
                const lid = document.createElement('div');
                lid.className = 'box-lid';
                
                const body = document.createElement('div');
                body.className = 'box-body';
                
                const marble = document.createElement('div');
                marble.className = 'marble';
                marble.id = 'marble-' + i;
                
                unit.appendChild(shadow);
                unit.appendChild(number);
                unit.appendChild(lid);
                unit.appendChild(body);
                unit.appendChild(marble);
                wrap.appendChild(unit);
            }
            
            marblePos = Math.floor(Math.random() * cfg.boxes);
        }

        function showMarble() {
            setStatus(CONFIG.messages.start);
            const unit = document.querySelectorAll('.box-unit')[marblePos];
            unit.classList.add('open');
            document.getElementById('marble-' + marblePos).classList.add('bounce');
        }

        function hideMarble() {
            document.querySelectorAll('.box-unit').forEach(function(u) { u.classList.remove('open'); });
        }

        function shuffleBoxes() {
            isShuffling = true;
            setStatus(CONFIG.messages.shuffling);
            
            const cfg = CONFIG.levels[currentLevel];
            const units = Array.from(document.querySelectorAll('.box-unit'));
            let count = 0;
            
            const interval = setInterval(() => {
                const idx1 = Math.floor(Math.random() * units.length);
                let idx2 = Math.floor(Math.random() * units.length);
                while (idx2 === idx1) idx2 = Math.floor(Math.random() * units.length);
                
                const box1 = units[idx1];
                const box2 = units[idx2];
                
                const rect1 = box1.getBoundingClientRect();
                const rect2 = box2.getBoundingClientRect();
                const parentRect = document.getElementById('boxesWrap').getBoundingClientRect();
                
                const pos1 = rect1.left - parentRect.left;
                const pos2 = rect2.left - parentRect.left;
                
                box1.classList.add('lifting');
                box2.classList.add('lifting');
                
                setTimeout(() => {
                    box1.style.transform = 'translateX(' + (pos2 - pos1) + 'px)';
                    box2.style.transform = 'translateX(' + (pos1 - pos2) + 'px)';
                }, 100);
                
                setTimeout(() => {
                    box1.style.transform = '';
                    box2.style.transform = '';
                    box1.classList.remove('lifting');
                    box2.classList.remove('lifting');
                    
                    const parent = box1.parentNode;
                    const next = box2.nextSibling;
                    parent.insertBefore(box2, box1);
                    parent.insertBefore(box1, next);
                    
                    marblePos = Math.floor(Math.random() * cfg.boxes);
                }, cfg.speed - 100);
                
                count++;
                if (count >= cfg.shuffleCount) {
                    clearInterval(interval);
                    setTimeout(() => {
                        isShuffling = false;
                        canGuess = true;
                        setStatus(CONFIG.messages.guess);
                        startTimer();
                    }, cfg.speed);
                }
            }, cfg.speed);
        }

        function startTimer() {
            const cfg = CONFIG.levels[currentLevel];
            const wrap = document.getElementById('timerWrap');
            const bar = document.getElementById('timerBar');
            const text = document.getElementById('timerText');
            
            wrap.classList.add('active');
            let timeLeft = 100;
            bar.style.width = '100%';
            bar.className = 'timer-bar-fill';
            
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft -= 1;
                bar.style.width = timeLeft + '%';
                text.textContent = Math.ceil(timeLeft / 100 * cfg.timeLimit) + 's';
                
                if (timeLeft <= 30) bar.className = 'timer-bar-fill danger';
                else if (timeLeft <= 60) bar.className = 'timer-bar-fill warning';
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    handleTimeout();
                }
            }, cfg.timeLimit * 10);
        }

        function handleTimeout() {
            if (!canGuess) return;
            canGuess = false;
            document.getElementById('timerWrap').classList.remove('active');
            scores[currentLevel] = false;
            
            setStatus(CONFIG.messages.timeout);
            showModal('⏰', "Time's Up!", "Even a turtle is faster than you!");
            document.getElementById('nextBtn').style.display = 'inline-block';
        }

        function handleGuess(index) {
            if (!canGuess || isShuffling) return;
            
            clearInterval(timerInterval);
            document.getElementById('timerWrap').classList.remove('active');
            
            const cfg = CONFIG.levels[currentLevel];
            const units = document.querySelectorAll('.box-unit');
            
            if (currentLevel === 3) {
                level4Attempts++;
                renderAttemptsDots();
                
                if (index === marblePos) {
                    let newPos;
                    do { newPos = Math.floor(Math.random() * cfg.boxes); }
                    while (newPos === marblePos);
                    marblePos = newPos;
                    
                    units[index].classList.add('open', 'wrong');
                    setStatus(CONFIG.messages.level4Trap);
                    
                    if (level4Attempts >= 3) {
                        canGuess = false;
                        scores[currentLevel] = false;
                        setTimeout(() => {
                            showModal('😈', "Trapped!", "Did you really think Level 4 would be that easy?");
                            document.getElementById('nextBtn').style.display = 'inline-block';
                        }, 1200);
                    } else {
                        setTimeout(() => {
                            units[index].classList.remove('open', 'wrong');
                            setStatus('Try again! ' + (3 - level4Attempts) + ' left...');
                        }, 1500);
                    }
                    return;
                } else {
                    units[index].classList.add('open', 'wrong');
                    
                    if (level4Attempts >= 3) {
                        canGuess = false;
                        scores[currentLevel] = false;
                        setStatus(CONFIG.messages.wrong);
                        
                        setTimeout(() => {
                            units[marblePos].classList.add('open', 'correct');
                            document.getElementById('marble-' + marblePos).classList.add('bounce');
                        }, 500);
                        
                        setTimeout(() => {
                            showModal('😵', "Failed!", "Level 4 conquered you!");
                            document.getElementById('nextBtn').style.display = 'inline-block';
                        }, 2000);
                    } else {
                        setTimeout(() => {
                            units[index].classList.remove('open', 'wrong');
                            setStatus('Wrong! ' + (3 - level4Attempts) + ' left...');
                        }, 1000);
                    }
                    return;
                }
            }
            
            canGuess = false;
            units[index].classList.add('open');
            
            if (index === marblePos) {
                scores[currentLevel] = true;
                units[index].classList.add('correct');
                document.getElementById('marble-' + index).classList.add('bounce');
                setStatus(CONFIG.messages.correct);
                createConfetti();
                
                setTimeout(() => {
                    showModal('🎯', "Bullseye!", "Your eyes are sharper than a hawk!");
                    document.getElementById('nextBtn').style.display = 'inline-block';
                }, 1500);
            } else {
                scores[currentLevel] = false;
                units[index].classList.add('wrong', 'shaking');
                setStatus(CONFIG.messages.wrong);
                
                setTimeout(() => {
                    units[marblePos].classList.add('open', 'correct');
                    document.getElementById('marble-' + marblePos).classList.add('bounce');
                }, 500);
                
                setTimeout(() => {
                    showModal('❌', "Wrong!", "My grandma guesses better than you!");
                    document.getElementById('nextBtn').style.display = 'inline-block';
                }, 2000);
            }
        }

        function renderAttemptsDots() {
            const dots = document.getElementById('attemptsDots');
            dots.innerHTML = '';
            for (let i = 0; i < 3; i++) {
                const dot = document.createElement('div');
                dot.className = 'attempt-dot';
                if (i < level4Attempts) dot.classList.add('used');
                dots.appendChild(dot);
            }
        }

        function nextLevel() {
            closeModal();
            document.getElementById('nextBtn').style.display = 'none';
            currentLevel++;
            
            if (currentLevel >= CONFIG.levels.length) {
                showFinalResults();
                return;
            }
            
            renderLevelTrack();
            startLevel();
        }

        function showFinalResults() {
            document.getElementById('gameArea').style.display = 'none';
            document.getElementById('attemptsPanel').classList.remove('active');
            
            const board = document.getElementById('scoreBoard');
            const content = document.getElementById('scoreContent');
            let html = '';
            let total = 0;
            
            CONFIG.levels.forEach((lvl, idx) => {
                let status = '⏳ Pending';
                let statusClass = '';
                if (scores[idx] === true) {
                    status = '✅ Correct';
                    statusClass = 'correct';
                    total++;
                } else if (scores[idx] === false) {
                    status = '❌ Wrong';
                    statusClass = 'wrong';
                }
                html += '<div class="score-row"><span>Level ' + lvl.level + '</span><span class="score-status ' + statusClass + '">' + status + '</span></div>';
            });
            
            html += '<div class="score-row"><span>Total Score</span><span>' + total + ' / 4</span></div>';
            
            content.innerHTML = html;
            board.classList.add('active');
            
            const final = document.getElementById('finalMessage');
            const cfg = CONFIG.messages.final;
            let result;
            if (total >= 3) result = cfg.score3;
            else if (total === 2) result = cfg.score2;
            else if (total === 1) result = cfg.score1;
            else result = cfg.score0;
            
            final.innerHTML = '<div class="final-emoji">' + result.emoji + '</div><div class="final-title">' + result.title + '</div><div class="final-text">' + result.text + '</div>';
            final.style.display = 'block';
            
            document.getElementById('restartBtn').style.display = 'inline-block';
            
            if (total >= 3) createConfetti();
        }

        function restartGame() {
            closeModal();
            currentLevel = 0;
            scores = [null, null, null, null];
            gameActive = false;
            
            document.getElementById('gameArea').style.display = 'flex';
            document.getElementById('scoreBoard').classList.remove('active');
            document.getElementById('finalMessage').style.display = 'none';
            document.getElementById('restartBtn').style.display = 'none';
            document.getElementById('startBtn').style.display = 'inline-block';
            document.getElementById('boxesWrap').innerHTML = '';
            document.getElementById('attemptsPanel').classList.remove('active');
            document.getElementById('timerWrap').classList.remove('active');
            
            setStatus("Welcome! Click START to begin");
            renderLevelTrack();
        }

        function showModal(emoji, title, message) {
            document.getElementById('modalEmoji').textContent = emoji;
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalMessage').textContent = message;
            document.getElementById('modalOverlay').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
        }

        function setStatus(msg) {
            const el = document.getElementById('statusText');
            el.classList.remove('animate');
            void el.offsetWidth;
            el.textContent = msg;
            el.classList.add('animate');
        }

        function createConfetti() {
            const container = document.getElementById('confettiWrap');
            const colors = ['#6366f1', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#3b82f6'];
            
            for (let i = 0; i < 60; i++) {
                const piece = document.createElement('div');
                piece.className = 'confetti-piece';
                piece.style.left = Math.random() * 100 + '%';
                piece.style.background = colors[Math.floor(Math.random() * colors.length)];
                piece.style.width = (6 + Math.random() * 10) + 'px';
                piece.style.height = (6 + Math.random() * 10) + 'px';
                piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                piece.style.animationDelay = Math.random() * 2 + 's';
                piece.style.animationDuration = (2 + Math.random() * 2) + 's';
                container.appendChild(piece);
                setTimeout(() => piece.remove(), 4000);
            }
        }
// ==================== DEVELOPER INFO ====================
(function addDevInfo() {
    const devSection = document.createElement('div');
    devSection.id = 'devInfo';
    devSection.innerHTML = `
        <div style="
            text-align: center;
            padding: 30px 20px;
            margin-top: 40px;
            border-top: 1px solid rgba(99, 102, 241, 0.15);
        ">
            <div style="
                font-size: 0.75rem;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 2px;
                color: #94a3b8;
                margin-bottom: 12px;
            ">Created By</div>
            <div style="
                font-size: 1.3rem;
                font-weight: 800;
                color: #1e293b;
                margin-bottom: 6px;
            ">Vishu</div>
            <div style="
                font-size: 0.9rem;
                color: #64748b;
                font-weight: 400;
            ">Student & Beginner Developer</div>
            <div style="
                margin-top: 12px;
                font-size: 0.75rem;
                color: #cbd5e1;
            ">Built with curiosity and code 💻</div>
        </div>
    `;
    document.querySelector('.game-wrap').appendChild(devSection);
})();
    </script>
</body>
